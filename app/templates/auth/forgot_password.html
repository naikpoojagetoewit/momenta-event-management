{% extends 'base.html' %}
{% block title %}Forgot Password - Momenta{% endblock %}
{% block content %}
<section class="auth-wrapper py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card auth-card p-4 p-md-5">
          <div class="text-center mb-4">
            <h3 class="brand-mark">Momenta</h3>
            <p class="text-muted">Enter your email to reset your password.</p>
          </div>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required autofocus>
            </div>
            <button type="submit" class="btn btn-brand w-100 rounded-pill py-2">Send Reset Link</button>
          </form>
          <p class="text-center mt-4 small"><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
