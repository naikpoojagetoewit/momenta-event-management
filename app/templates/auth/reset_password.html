{% extends 'base.html' %}
{% block title %}Reset Password - Momenta{% endblock %}
{% block content %}
<section class="auth-wrapper py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card auth-card p-4 p-md-5">
          <div class="text-center mb-4">
            <h3 class="brand-mark">Momenta</h3>
            <p class="text-muted">Choose a new password.</p>
          </div>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-brand w-100 rounded-pill py-2">Reset Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
