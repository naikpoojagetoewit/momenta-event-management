{% extends 'base.html' %}
{% block title %}Register - Momenta{% endblock %}
{% block content %}
<section class="auth-wrapper py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card auth-card p-4 p-md-5">
          <div class="text-center mb-4">
            <h3 class="brand-mark">Momenta</h3>
            <p class="text-muted">Create your account and start planning.</p>
          </div>
          <form method="POST">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Mobile Number</label>
                <input type="text" name="phone" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Address</label>
                <input type="text" name="address" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
              </div>
            </div>
            <button type="submit" class="btn btn-brand w-100 rounded-pill py-2 mt-4">Register</button>
          </form>
          <p class="text-center mt-4 small">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
